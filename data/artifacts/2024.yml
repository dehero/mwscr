2024-12-23-interview:
  title: I've been photographing Morrowind for 15 years! Interview with the founder of the Morrowind Screenshots project
  titleRu: «Фотографирую Morrowind уже 15 лет» — интервью с основателем проекта Morrowind Screenshots
  description:
    Dear followers! I would like to share with you an interview conducted by game blogger Dmitry Epikhin. It is entirely
    dedicated to the story of the Morrowind Screenshots project and Morrowind in general. Enjoy reading it!
  descriptionRu:
    Дорогие подписчики! Делюсь с вами интервью, взятым у меня игровым блогером Дмитрием Епихиным. Оно полностью
    посвящено рассказу о проекте Morrowind Screenshots и о Morrowind в целом. Приятного чтения!
  url: https://medium.com/@dmepikh/ive-been-photographing-morrowind-for-15-years-interview-with-the-founder-of-the-morrowind-a5ee65712217
